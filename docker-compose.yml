---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    # image: freqtradeorg/freqtrade:develop
    # Use plotting image
    # image: freqtradeorg/freqtrade:develop_plot
    # # Enable GPU Image and GPU Resources (only relevant for freqAI)
    # # Make sure to uncomment the whole deploy section
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Build step - only needed when additional dependencies are needed
    # build:
    #   context: .
    #   dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade
    user: "0:0"
    volumes:
      - "ft_data:/freqtrade/persist"
    # Expose api on port 8080 (localhost only)
    # Please read the https://www.freqtrade.io/en/stable/rest-api/ documentation
    # for more information.
    ports:
      - "18080:8080"
    entrypoint: ["/bin/sh"]
    environment:
      FT_MODE: "trade"
      FT_PAIRS: "BTC/USDT ETH/USDT SOL/USDT XRP/USDT DOGE/USDT BNB/USDT ADA/USDT TRX/USDT LINK/USDT LTC/USDT ATOM/USDT DOT/USDT"
      FT_TIMEFRAMES: "5m 15m 1h"
      FT_DAYS: "180"
      FT_TIMERANGE: "20240101-"
      FT_HYPEROPT_EPOCHS: "120"
    # Default command used when running `docker compose up`
    command:
      - -c
      - |
        set -e
        UD=/freqtrade/persist/user_data
        REPORTS=/freqtrade/persist/reports
        TS=$$(date +%Y%m%d-%H%M%S)
        mkdir -p "$$UD/logs" "$$REPORTS"

        /usr/local/bin/freqtrade new-strategy --strategy SampleStrategy --template minimal --userdir "$$UD" >/tmp/new-strategy.log 2>&1 || true
        /usr/local/bin/freqtrade new-strategy --strategy FreqaiSpotStrategy --template freqai --userdir "$$UD" >/tmp/new-freqai.log 2>&1 || true

        cat >/tmp/base-config.json <<'JSON'
        {
          "$$schema": "https://schema.freqtrade.io/schema.json",
          "max_open_trades": 10,
          "stake_currency": "USDT",
          "stake_amount": 30,
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "dry_run": true,
          "dry_run_wallet": 1000,
          "cancel_open_orders_on_exit": false,
          "trading_mode": "spot",
          "timeframe": "5m",
          "unfilledtimeout": {
            "entry": 10,
            "exit": 10,
            "unit": "minutes",
            "exit_timeout_count": 0
          },
          "entry_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1
          },
          "exit_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1
          },
          "exchange": {
            "name": "binance",
            "key": "",
            "secret": "",
            "ccxt_config": {},
            "ccxt_async_config": {
              "enableRateLimit": true
            },
            "pair_whitelist": [
              "BTC/USDT",
              "ETH/USDT",
              "SOL/USDT",
              "XRP/USDT",
              "DOGE/USDT",
              "BNB/USDT",
              "ADA/USDT",
              "TRX/USDT",
              "LINK/USDT",
              "LTC/USDT",
              "ATOM/USDT",
              "DOT/USDT"
            ],
            "pair_blacklist": []
          },
          "pairlists": [
            {
              "method": "StaticPairList"
            }
          ],
          "api_server": {
            "enabled": true,
            "listen_ip_address": "0.0.0.0",
            "listen_port": 8080,
            "verbosity": "error",
            "enable_openapi": false,
            "jwt_secret_key": "change_this_now_coolify_freqtrade",
            "CORS_origins": [],
            "username": "freqtrader",
            "password": "freqtrader"
          },
          "bot_name": "freqtrade-coolify",
          "initial_state": "running",
          "force_entry_enable": false,
          "internals": {
            "process_throttle_secs": 5
          }
        }
        JSON

        cat >/tmp/freqai-config.json <<'JSON'
        {
          "$$schema": "https://schema.freqtrade.io/schema.json",
          "max_open_trades": 5,
          "stake_currency": "USDT",
          "stake_amount": 30,
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "dry_run": true,
          "dry_run_wallet": 1000,
          "cancel_open_orders_on_exit": false,
          "trading_mode": "spot",
          "timeframe": "5m",
          "exchange": {
            "name": "binance",
            "key": "",
            "secret": "",
            "ccxt_config": {},
            "ccxt_async_config": {
              "enableRateLimit": true
            },
            "pair_whitelist": [
              "BTC/USDT",
              "ETH/USDT",
              "SOL/USDT",
              "XRP/USDT",
              "DOGE/USDT",
              "BNB/USDT"
            ],
            "pair_blacklist": []
          },
          "pairlists": [
            {
              "method": "StaticPairList"
            }
          ],
          "api_server": {
            "enabled": true,
            "listen_ip_address": "0.0.0.0",
            "listen_port": 8080,
            "verbosity": "error",
            "enable_openapi": false,
            "jwt_secret_key": "change_this_now_coolify_freqtrade",
            "CORS_origins": [],
            "username": "freqtrader",
            "password": "freqtrader"
          },
          "bot_name": "freqtrade-freqai",
          "initial_state": "running",
          "force_entry_enable": false,
          "internals": {
            "process_throttle_secs": 5
          },
          "freqai": {
            "enabled": true,
            "identifier": "coolify-freqai",
            "train_period_days": 30,
            "backtest_period_days": 7,
            "live_retrain_hours": 4,
            "purge_old_models": 2,
            "feature_parameters": {
              "include_timeframes": ["5m", "15m", "1h"],
              "include_corr_pairlist": ["BTC/USDT", "ETH/USDT"],
              "label_period_candles": 24,
              "include_shifted_candles": 2,
              "indicator_periods_candles": [10, 20]
            },
            "data_split_parameters": {
              "test_size": 0.2,
              "shuffle": false
            }
          }
        }
        JSON

        if [ "$$FT_MODE" = "trade" ]; then
          exec /usr/local/bin/freqtrade trade \
            --user-data-dir "$$UD" \
            --logfile "$$UD/logs/freqtrade.log" \
            --db-url sqlite:////freqtrade/persist/user_data/tradesv3.sqlite \
            --config /tmp/base-config.json \
            --strategy SampleStrategy
        fi

        if [ "$$FT_MODE" = "download" ]; then
          exec /usr/local/bin/freqtrade download-data \
            --user-data-dir "$$UD" \
            --exchange binance \
            --timeframes $$FT_TIMEFRAMES \
            --days "$$FT_DAYS" \
            --pairs $$FT_PAIRS
        fi

        if [ "$$FT_MODE" = "backtest" ]; then
          /usr/local/bin/freqtrade download-data \
            --user-data-dir "$$UD" \
            --exchange binance \
            --timeframes $$FT_TIMEFRAMES \
            --days "$$FT_DAYS" \
            --pairs $$FT_PAIRS
          /usr/local/bin/freqtrade backtesting \
            --user-data-dir "$$UD" \
            --config /tmp/base-config.json \
            --strategy SampleStrategy \
            --timeframe 5m \
            --timerange "$$FT_TIMERANGE" \
            --export trades | tee "$$REPORTS/backtest-$$TS.log"
          echo "Backtest completed at $$TS. Review: $$REPORTS/backtest-$$TS.log" | tee "$$REPORTS/recommendation-latest.txt"
          exit 0
        fi

        if [ "$$FT_MODE" = "hyperopt" ]; then
          /usr/local/bin/freqtrade download-data \
            --user-data-dir "$$UD" \
            --exchange binance \
            --timeframes $$FT_TIMEFRAMES \
            --days "$$FT_DAYS" \
            --pairs $$FT_PAIRS
          /usr/local/bin/freqtrade hyperopt \
            --user-data-dir "$$UD" \
            --config /tmp/base-config.json \
            --strategy SampleStrategy \
            --spaces buy sell roi stoploss \
            --epochs "$$FT_HYPEROPT_EPOCHS" \
            --timeframe 5m \
            --timerange "$$FT_TIMERANGE" | tee "$$REPORTS/hyperopt-$$TS.log"
          /usr/local/bin/freqtrade hyperopt-list \
            --user-data-dir "$$UD" \
            --config /tmp/base-config.json \
            --best --print-json > "$$REPORTS/hyperopt-best-$$TS.json" || true
          echo "Hyperopt completed at $$TS. Review logs: $$REPORTS/hyperopt-$$TS.log and best params: $$REPORTS/hyperopt-best-$$TS.json" | tee "$$REPORTS/recommendation-latest.txt"
          exit 0
        fi

        if [ "$$FT_MODE" = "freqai" ]; then
          /usr/local/bin/freqtrade download-data \
            --user-data-dir "$$UD" \
            --exchange binance \
            --timeframes $$FT_TIMEFRAMES \
            --days "$$FT_DAYS" \
            --pairs $$FT_PAIRS
          exec /usr/local/bin/freqtrade trade \
            --user-data-dir "$$UD" \
            --logfile "$$UD/logs/freqtrade.log" \
            --db-url sqlite:////freqtrade/persist/user_data/tradesv3.sqlite \
            --config /tmp/freqai-config.json \
            --strategy FreqaiSpotStrategy \
            --freqaimodel LightGBMRegressor
        fi

        echo "Unknown FT_MODE: $$FT_MODE"
        echo "Use one of: trade, download, backtest, hyperopt, freqai"
        exit 1

volumes:
  ft_data:
