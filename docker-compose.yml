---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    # image: freqtradeorg/freqtrade:develop
    # Use plotting image
    # image: freqtradeorg/freqtrade:develop_plot
    # # Enable GPU Image and GPU Resources (only relevant for freqAI)
    # # Make sure to uncomment the whole deploy section
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Build step - only needed when additional dependencies are needed
    # build:
    #   context: .
    #   dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade
    # Expose api on port 8080 (localhost only)
    # Please read the https://www.freqtrade.io/en/stable/rest-api/ documentation
    # for more information.
    ports:
      - "18080:8080"
    entrypoint: ["/bin/sh"]
    # Default command used when running `docker compose up`
    command:
      - -c
      - >
        mkdir -p /tmp/user_data/logs &&
        freqtrade new-strategy --strategy SampleStrategy --template minimal --userdir /tmp/user_data >/tmp/new-strategy.log 2>&1 || true &&
        cp -f /freqtrade/config_examples/config_binance.example.json /tmp/coolify-config.json &&
        exec freqtrade trade
        --user-data-dir /tmp/user_data
        --logfile /tmp/user_data/logs/freqtrade.log
        --db-url sqlite:////tmp/user_data/tradesv3.sqlite
        --config /tmp/coolify-config.json
        --strategy SampleStrategy
