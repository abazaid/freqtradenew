---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    # image: freqtradeorg/freqtrade:develop
    # Use plotting image
    # image: freqtradeorg/freqtrade:develop_plot
    # # Enable GPU Image and GPU Resources (only relevant for freqAI)
    # # Make sure to uncomment the whole deploy section
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Build step - only needed when additional dependencies are needed
    # build:
    #   context: .
    #   dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade
    # Expose api on port 8080 (localhost only)
    # Please read the https://www.freqtrade.io/en/stable/rest-api/ documentation
    # for more information.
    ports:
      - "18080:8080"
    entrypoint: ["/bin/sh"]
    # Default command used when running `docker compose up`
    command:
      - -c
      - |
        mkdir -p /tmp/user_data/logs
        freqtrade new-strategy --strategy SampleStrategy --template minimal --userdir /tmp/user_data >/tmp/new-strategy.log 2>&1 || true
        cat >/tmp/coolify-config.json <<'JSON'
        {
          "$schema": "https://schema.freqtrade.io/schema.json",
          "max_open_trades": 10,
          "stake_currency": "USDT",
          "stake_amount": 30,
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "dry_run": true,
          "dry_run_wallet": 1000,
          "cancel_open_orders_on_exit": false,
          "trading_mode": "spot",
          "timeframe": "5m",
          "unfilledtimeout": {
            "entry": 10,
            "exit": 10,
            "unit": "minutes",
            "exit_timeout_count": 0
          },
          "entry_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1
          },
          "exit_pricing": {
            "price_side": "same",
            "use_order_book": true,
            "order_book_top": 1
          },
          "exchange": {
            "name": "binance",
            "key": "",
            "secret": "",
            "ccxt_config": {},
            "ccxt_async_config": {
              "enableRateLimit": true
            },
            "pair_whitelist": [
              "BTC/USDT",
              "ETH/USDT",
              "SOL/USDT",
              "XRP/USDT",
              "DOGE/USDT",
              "BNB/USDT",
              "ADA/USDT",
              "TRX/USDT",
              "LINK/USDT",
              "LTC/USDT",
              "ATOM/USDT",
              "DOT/USDT"
            ],
            "pair_blacklist": []
          },
          "pairlists": [
            {
              "method": "StaticPairList"
            }
          ],
          "api_server": {
            "enabled": true,
            "listen_ip_address": "0.0.0.0",
            "listen_port": 8080,
            "verbosity": "error",
            "enable_openapi": false,
            "jwt_secret_key": "change_this_now_coolify_freqtrade",
            "CORS_origins": [],
            "username": "freqtrader",
            "password": "freqtrader"
          },
          "bot_name": "freqtrade-coolify",
          "initial_state": "running",
          "force_entry_enable": false,
          "internals": {
            "process_throttle_secs": 5
          }
        }
        JSON
        exec freqtrade trade \
          --user-data-dir /tmp/user_data \
          --logfile /tmp/user_data/logs/freqtrade.log \
          --db-url sqlite:////tmp/user_data/tradesv3.sqlite \
          --config /tmp/coolify-config.json \
          --strategy SampleStrategy
